disabled_rules:
  - cyclomatic_complexity
  - force_cast
  - force_try
  - function_body_length
  - identifier_name
  - file_length
  - leading_whitespace
  - static_over_final_class
  - type_name
  - unused_enumerated

line_length:
  warning: 110

nesting:
  function_level: 1
  type_level: 4

trailing_whitespace:
  severity: error

excluded:
  - .build
  - Package.swift
